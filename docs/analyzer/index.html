<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Reality Check Analyzer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        color: #111827;
      }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #e5e7eb;
        font-size: 12px;
      }
      .log {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #f9fafb;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Analyzer Stub</h1>
    <p class="badge">Waiting for Flutter</p>
    <div id="log" class="log">Ready.</div>

    <script>
      const logEl = document.getElementById("log");

      function log(message) {
        logEl.textContent = message;
      }

      function buildStubResult() {
        return {
          summary: {
            aiGeneratedScore: 0.42,
            tamperScore: 0.33,
            beautyFilterScore: 0.27,
            confidence: 0.5,
            notes: [
              "Stub response from analyzer page.",
              "Replace with image-reality-check pipeline."
            ]
          }
        };
      }

      window.analyzeImage = async function (payload) {
        try {
          log("Received image. Running stub analysis...");
          const result = buildStubResult(payload);
          if (
            window.AnalyzerChannel &&
            typeof window.AnalyzerChannel.postMessage === "function"
          ) {
            window.AnalyzerChannel.postMessage(JSON.stringify(result));
          } else {
            log("AnalyzerChannel not found. Result: " + JSON.stringify(result));
          }
        } catch (err) {
          const errorPayload = { error: String(err) };
          if (
            window.AnalyzerChannel &&
            typeof window.AnalyzerChannel.postMessage === "function"
          ) {
            window.AnalyzerChannel.postMessage(JSON.stringify(errorPayload));
          } else {
            log("Error: " + String(err));
          }
        }
      };
    </script>
  </body>
</html>
